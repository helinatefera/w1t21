services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ledgermint
      POSTGRES_USER: ledgermint
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgermint"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://ledgermint:${DB_PASSWORD:-changeme}@postgres:5432/ledgermint?sslmode=disable
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev_jwt_secret_change_in_production}
      AES_MASTER_KEY: ${AES_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LISTEN_ADDR: ":8080"
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-false}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
      - metrics_logs:/var/log/ledgermint
      - ./scripts:/app/scripts:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  metrics_logs:
